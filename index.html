<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FNAG | Office</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body {
            background: black;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: black;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // размер холста под окно
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        resize();

        // картинки
        const images = {
            office: new Image(),
            left: new Image(),
            right: new Image()
        };

        images.office.src = "office.jpg";
        images.left.src = "left.jpg";
        images.right.src = "right.jpg";

        let currentView = "office"; // office, left, right
        let loadedCount = 0;
        let loadError = false;
        let errorMessage = "";

        function checkLoad() {
            loadedCount++;
            if(loadedCount === 3) draw();
        }

        function handleError(imgName) {
            loadError = true;
            errorMessage = `Не загрузилось: ${imgName}.jpg`;
            draw();
        }

        images.office.onload = checkLoad;
        images.left.onload = checkLoad;
        images.right.onload = checkLoad;

        images.office.onerror = () => handleError("office");
        images.left.onerror = () => handleError("left");
        images.right.onerror = () => handleError("right");

        function draw() {
            // Ошибка загрузки
            if(loadError) {
                ctx.fillStyle = "#111";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "red";
                ctx.font = "18px monospace";
                ctx.fillText("ОШИБКА", 50, 100);
                ctx.fillStyle = "white";
                ctx.font = "14px monospace";
                ctx.fillText(errorMessage, 50, 150);
                ctx.fillText("Файлы должны быть в одной папке с index.html", 50, 200);
                ctx.fillText("Имена: office.jpg , left.jpg , right.jpg", 50, 250);
                return;
            }

            // Загрузка
            if(loadedCount < 3) {
                ctx.fillStyle = "#111";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#aaa";
                ctx.font = "16px monospace";
                ctx.fillText("Загрузка...", 30, 80);
                return;
            }

            // Нормальный режим: рисуем картинку
            let img = images.office;
            if(currentView === "left") img = images.left;
            if(currentView === "right") img = images.right;
            
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        // управление
        function turnLeft() {
            if(currentView === "office") currentView = "left";
            else if(currentView === "right") currentView = "office";
            draw();
        }

        function turnRight() {
            if(currentView === "office") currentView = "right";
            else if(currentView === "left") currentView = "office";
            draw();
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            if(x < canvas.width / 2) turnLeft();
            else turnRight();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
            if(x < canvas.width / 2) turnLeft();
            else turnRight();
        });
    })();
</script>
</body>
</html>

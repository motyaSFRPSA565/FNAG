<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FNAG | Office</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body {
            background: black;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: black;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // размер холста под окно
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        resize();

        let currentView = "office"; // office, left, right

        function draw() {
            // Офис — серый
            if(currentView === "office") {
                ctx.fillStyle = "#555";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "24px monospace";
                ctx.fillText("OFFICE", canvas.width/2-50, canvas.height/2);
            }
            // Левый поворот — зелёный
            else if(currentView === "left") {
                ctx.fillStyle = "green";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "24px monospace";
                ctx.fillText("LEFT", canvas.width/2-40, canvas.height/2);
            }
            // Правый поворот — синий
            else if(currentView === "right") {
                ctx.fillStyle = "blue";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "24px monospace";
                ctx.fillText("RIGHT", canvas.width/2-40, canvas.height/2);
            }
        }

        function turnLeft() {
            if(currentView === "office") currentView = "left";
            else if(currentView === "right") currentView = "office";
            draw();
        }

        function turnRight() {
            if(currentView === "office") currentView = "right";
            else if(currentView === "left") currentView = "office";
            draw();
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            if(x < canvas.width / 2) turnLeft();
            else turnRight();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
            if(x < canvas.width / 2) turnLeft();
            else turnRight();
        });
    })();
</script>
</body>
</html>
